<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .hero-overlay {
            background: linear-gradient(rgba(7, 29, 58, 0.85), rgba(7, 29, 58, 0.85));
        }
        .text-university-gold {
            color: #ad7c0e; /* Tying to on-tertiary-container for GDU Gold */
        }
        .btn-primary {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
    </style>

<body class="bg-surface font-body-md text-on-surface antialiased">
<!-- Login Context Shell: Following Suppression Rule (No Top/Bottom Nav for Login) -->
<main class="relative min-h-screen flex items-center justify-center px-margin-mobile md:px-0 overflow-hidden">
<!-- Background Layer -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 hero-overlay z-10"></div>
<img class="w-full h-full object-cover" data-alt="A panoramic view of the majestic Ethiopian Simien Mountains at dawn, featuring sharp plateaus and deep valleys under a soft morning mist. The lighting is cinematic and high-contrast, with golden sunlight breaking through clouds to highlight the rugged textures of the landscape. The overall mood is one of prestigious stability and timeless natural beauty, colored with deep navy and atmospheric gold tones to match the Global Diaspora University brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAaBi7muHINkMtNyUgtwWLTxNIht5Z6HEw-x72uMFRUiLUespTfFRI2ZxJ-6gmeaJdViNrVWnUELERtqlHJBCCXpfnMHN1yZxqjLDS9t5AhVPg_4zlP64l6uHD0c7331wKZl_5wZ95G4brL1m2MHqNuGGZukNOo7Q2Xfs8hxUkFDfbpACFytxSC-p0voQ9OLng2ubk-ENI2ovyn6Axe78SfpiQDGO-FhWNjFOJVDfC33ZcvQT9q8SZNW4xJSrd9EVwhfcR6PEgzUDo"/>
</div>
<!-- Centered Login Card -->
<section class="relative z-20 w-full max-w-[440px] animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="bg-surface-container-lowest shadow-[0px_4px_20px_rgba(7,29,58,0.08)] border border-on-surface-variant/10 rounded-lg overflow-hidden">
<!-- Institutional Header -->
<div class="pt-stack-lg pb-stack-md px-stack-lg flex flex-col items-center text-center">
<img alt="Global Diaspora University" class="h-20 w-auto mb-stack-md" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0kbXyk5kWCKu5sg8CSGonH2xsMas7LQoqNJE_bDBZooq3kC7w3tnzjCOAv32YZ4C6fe6UzKNxRJgs143hfwh-_Fpi2u24uKnXiKcX4J2U3zBN5PSNTeGJY5hnzT8aYlhVnKXxoKA7WZI7mWV9vO3UOSyJktNx014oBjcx4tGtn5DgexwHVluLLOqB9J_EHV4AN3ficGbzhov6PXsVVBE1zubFRVpZLsTPpVOrVJw1zGlrbW275ZFPvYdbew5gmr_VuukfslC7zZE"/>
<h1 class="font-headline-md text-headline-md text-primary-container tracking-tight">Student Portal</h1>
<p class="font-body-md text-on-surface-variant mt-2">Access your global learning environment</p>
</div>
<!-- Form Section -->
<form class="px-stack-lg pb-stack-lg space-y-stack-md" onsubmit="event.preventDefault();">
<div class="space-y-base">
<label class="block font-label-sm text-label-sm text-on-primary-fixed uppercase tracking-wider" for="student_id">Student ID or Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-[4px] focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md" id="student_id" name="student_id" placeholder="e.g. GDU-123456" type="text"/>
</div>
</div>
<div class="space-y-base">
<div class="flex justify-between items-center">
<label class="block font-label-sm text-label-sm text-on-primary-fixed uppercase tracking-wider" for="password">Password</label>
<a class="font-label-sm text-label-sm text-tertiary-fixed-dim hover:text-on-tertiary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface-container-lowest border border-outline-variant rounded-[4px] focus:ring-2 focus:ring-primary-container focus:border-primary-container outline-none transition-all font-body-md" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-2 py-1">
<input class="w-4 h-4 text-primary-container border-outline-variant rounded-sm focus:ring-primary-container" id="remember" type="checkbox"/>
<label class="font-body-md text-on-surface-variant text-[14px]" for="remember">Keep me signed in on this device</label>
</div>
<div class="pt-base">
<button class="w-full bg-primary-container text-surface-white font-tagline text-tagline py-4 rounded-[2px] btn-primary hover:bg-on-primary-fixed-variant shadow-sm flex items-center justify-center gap-2" type="submit">
<span>LOGIN TO VIRTUAL CLASSROOM</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</div>
</form>
<!-- Footer Support -->
<div class="bg-surface-container-low px-stack-lg py-stack-md flex justify-center items-center border-t border-on-surface-variant/5">
<p class="font-body-md text-[13px] text-on-surface-variant">
                        Need assistance? 
                        <a class="text-tertiary-fixed-dim font-semibold hover:underline" href="#">Contact Student Support</a>
</p>
</div>
</div>
<!-- Branding Sub-label -->
<div class="mt-stack-lg text-center">
<p class="font-tagline text-[11px] text-surface-lowest/60 uppercase tracking-[0.2em]">
                    © 2024 Global Diaspora University • Academic Rigor • Global Access
                </p>
</div>
</section>
<!-- Decorative Elements: Academic Heritage -->
<div class="absolute bottom-margin-desktop left-margin-desktop hidden lg:block opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-surface-lowest" style="font-variation-settings: 'wght' 100;">school</span>
</div>
<div class="absolute top-margin-desktop right-margin-desktop hidden lg:block opacity-20 pointer-events-none">
<span class="material-symbols-outlined text-[120px] text-surface-lowest" style="font-variation-settings: 'wght' 100;">public</span>
</div>
</main>
<script>
        // Simple micro-interaction for password visibility toggle
        document.querySelector('button[type="button"]').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('.material-symbols-outlined');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility';
            }
        });

        // Entrance animation enhancement
        window.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('section');
            card.classList.add('opacity-100');
        });
    </script>
</body></html>
